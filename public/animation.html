<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Applictus Intro Animation</title>
  <link rel="preload" href="/Applictus_logo.png" as="image">
  <style>
    :root {
      --stage-duration: 6.8s;
      --ease-out: cubic-bezier(0.18, 0.86, 0.24, 1);
      --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
      --navy-950: #020711;
      --navy-900: #061226;
      --navy-800: #071a33;
      --blue-glow: rgba(58, 129, 246, 0.34);
      --green: #55d68f;
      --red: #ff6b7a;
      --white: #f8fbff;
      --muted: rgba(216, 229, 248, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--navy-950);
      color: var(--white);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-width: 100vw;
      min-height: 100vh;
    }

    .intro-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 45%, rgba(65, 139, 255, 0.24), transparent 0 28%),
        radial-gradient(circle at 52% 48%, rgba(83, 214, 143, 0.11), transparent 0 20%),
        radial-gradient(circle at 46% 52%, rgba(255, 96, 122, 0.09), transparent 0 18%),
        linear-gradient(135deg, var(--navy-950) 0%, var(--navy-900) 43%, var(--navy-800) 100%);
      animation: stageFade var(--stage-duration) linear both;
    }

    .intro-stage::before,
    .intro-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .intro-stage::before {
      background:
        radial-gradient(circle at 50% 50%, rgba(92, 164, 255, 0.42), transparent 0 19%),
        radial-gradient(circle at 50% 50%, rgba(85, 214, 143, 0.12), transparent 0 28%);
      filter: blur(18px);
      opacity: 0;
      transform: scale(0.82);
      animation: glowRise var(--stage-duration) ease both;
    }

    .intro-stage::after {
      background-image:
        linear-gradient(rgba(158, 191, 235, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(158, 191, 235, 0.05) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, transparent 0 34%, rgba(0, 0, 0, 0.36) 100%);
      background-size: 72px 72px, 72px 72px, 100% 100%;
      mask-image: radial-gradient(circle at 50% 50%, black 0 58%, transparent 78%);
      opacity: 0.34;
      animation: gridDrift 13s linear infinite;
    }

    .particle-field {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: rgba(190, 216, 255, 0.54);
      box-shadow: 0 0 18px rgba(87, 151, 248, 0.45);
      opacity: 0;
      animation: particleFloat var(--stage-duration) ease both;
    }

    .particle:nth-child(1) { left: 18%; top: 24%; animation-delay: 0.2s; }
    .particle:nth-child(2) { left: 28%; top: 69%; animation-delay: 0.5s; }
    .particle:nth-child(3) { left: 39%; top: 18%; animation-delay: 0.9s; }
    .particle:nth-child(4) { left: 61%; top: 22%; animation-delay: 0.4s; }
    .particle:nth-child(5) { left: 73%; top: 63%; animation-delay: 0.7s; }
    .particle:nth-child(6) { left: 84%; top: 36%; animation-delay: 1.1s; }
    .particle:nth-child(7) { left: 13%; top: 51%; animation-delay: 1.2s; }
    .particle:nth-child(8) { left: 52%; top: 78%; animation-delay: 0.8s; }

    .brand-lockup {
      --icon-size: clamp(142px, 8.9vw, 182px);
      --intro-offset: clamp(220px, 17vw, 340px);
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: var(--icon-size) minmax(0, auto);
      align-items: center;
      justify-content: center;
      gap: clamp(24px, 2.4vw, 42px);
      width: min(1120px, calc(100vw - 112px));
      min-height: min(420px, calc(100vh - 120px));
    }

    .brand-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: var(--icon-size);
      height: var(--icon-size);
      transform-origin: center;
      will-change: transform, opacity, filter;
      animation: brandIconMotion var(--stage-duration) var(--ease-premium) both;
    }

    .brand-icon::before {
      content: "";
      position: absolute;
      inset: -34%;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(75, 145, 255, 0.42), transparent 0 56%),
        radial-gradient(circle, rgba(85, 214, 143, 0.16), transparent 0 70%);
      filter: blur(16px);
      opacity: 0;
      animation: iconAura var(--stage-duration) ease both;
    }

    .brand-icon::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -19%;
      height: 24%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(78, 150, 255, 0.25), transparent 70%);
      filter: blur(10px);
      opacity: 0;
      transform: scaleX(0.62);
      animation: reflectionIn var(--stage-duration) ease both;
    }

    .brand-logo {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter:
        drop-shadow(0 18px 34px rgba(0, 0, 0, 0.34))
        drop-shadow(0 0 22px rgba(69, 138, 247, 0.18));
    }

    .brand-copy {
      display: grid;
      align-content: center;
      justify-items: start;
      width: max-content;
      max-width: 100%;
      min-width: 0;
      transform: translateY(5px);
    }

    .wordmark {
      margin: -0.02em 0 -0.08em;
      padding: 0.02em 0.02em 0.14em 0;
      color: var(--white);
      font-size: clamp(80px, 6.95vw, 134px);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: 0;
      text-shadow:
        0 18px 34px rgba(0, 0, 0, 0.34),
        0 0 30px rgba(74, 140, 248, 0.2);
      clip-path: inset(0 100% 0 0);
      opacity: 0;
      transform: translateX(-18px);
      will-change: transform, opacity, clip-path;
      animation: wordmarkReveal var(--stage-duration) var(--ease-out) both;
    }

    .divider {
      width: calc(100% + 12px);
      height: 1px;
      margin-left: -6px;
      margin-top: clamp(20px, 1.6vw, 28px);
      overflow: hidden;
      background: rgba(205, 222, 247, 0.2);
      transform-origin: left;
      opacity: 0;
      animation: dividerReveal var(--stage-duration) var(--ease-out) both;
    }

    .divider::before {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(85, 214, 143, 0.86), rgba(82, 145, 249, 0.88), rgba(255, 107, 122, 0.78));
      transform: translateX(-101%);
      animation: dividerSweep var(--stage-duration) var(--ease-out) both;
    }

    .subtitle {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1.3vw, 20px);
      margin-top: clamp(14px, 1.2vw, 20px);
      color: var(--muted);
      font-size: clamp(15px, 1.12vw, 22px);
      font-weight: 760;
      letter-spacing: 0.28em;
      line-height: 1.35;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(12px);
      animation: subtitleReveal var(--stage-duration) var(--ease-out) both;
    }

    .subtitle .is-application {
      color: var(--green);
    }

    .subtitle .is-status {
      color: var(--red);
    }

    .subtitle .is-neutral,
    .subtitle .is-tracker {
      color: rgba(248, 251, 255, 0.9);
    }

    @keyframes stageFade {
      0% { filter: brightness(0); }
      9%, 100% { filter: brightness(1); }
    }

    @keyframes glowRise {
      0% { opacity: 0; transform: scale(0.7); }
      10% { opacity: 0.4; transform: scale(0.86); }
      24% { opacity: 0.72; transform: scale(1); }
      64% { opacity: 0.56; transform: scale(1.04); }
      100% { opacity: 0.5; transform: scale(1.08); }
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0, 0 0; }
      to { background-position: 72px 72px, 72px 72px, 0 0; }
    }

    @keyframes particleFloat {
      0%, 12% { opacity: 0; transform: translate3d(0, 16px, 0) scale(0.7); }
      30% { opacity: 0.42; }
      72% { opacity: 0.22; }
      100% { opacity: 0; transform: translate3d(0, -44px, 0) scale(1); }
    }

    @keyframes brandIconMotion {
      0%, 8% {
        opacity: 0;
        filter: blur(14px);
        transform: translateX(var(--intro-offset)) scale(1.5);
      }
      15% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(var(--intro-offset)) scale(1.64);
      }
      25% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(var(--intro-offset)) scale(1.68);
      }
      39%, 100% {
        opacity: 1;
        filter: blur(0);
        transform: translateX(0) scale(1);
      }
    }

    @keyframes iconAura {
      0%, 8% { opacity: 0; transform: scale(0.72); }
      16% { opacity: 0.86; transform: scale(1); }
      27% { opacity: 1; transform: scale(1.08); }
      41% { opacity: 0.64; transform: scale(0.95); }
      100% { opacity: 0.5; transform: scale(0.98); }
    }

    @keyframes reflectionIn {
      0%, 32% { opacity: 0; transform: scaleX(0.45); }
      43%, 100% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes wordmarkReveal {
      0%, 34% {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
        transform: translateX(-18px);
      }
      50%, 100% {
        opacity: 1;
        clip-path: inset(0 0 0 0);
        transform: translateX(0);
      }
    }

    @keyframes dividerReveal {
      0%, 48% {
        opacity: 0;
      }
      54%, 100% {
        opacity: 1;
      }
    }

    @keyframes dividerSweep {
      0%, 48% {
        transform: translateX(-101%);
      }
      62%, 100% {
        transform: translateX(0);
      }
    }

    @keyframes subtitleReveal {
      0%, 52% {
        opacity: 0;
        transform: translateY(12px);
      }
      66%, 100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .brand-lockup {
        --icon-size: clamp(94px, 25vw, 132px);
        --intro-offset: 0px;
        grid-template-columns: 1fr;
        gap: 22px;
        width: min(540px, calc(100vw - 48px));
        text-align: center;
      }

      .brand-icon,
      .brand-copy {
        justify-self: center;
      }

      .brand-copy {
        justify-items: center;
        transform: none;
      }

      .wordmark {
        font-size: clamp(58px, 16vw, 92px);
      }

      .subtitle {
        justify-content: center;
        gap: 10px;
        white-space: normal;
        letter-spacing: 0.16em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-stage,
      .intro-stage::before,
      .intro-stage::after,
      .particle,
      .brand-icon,
      .brand-icon::before,
      .brand-icon::after,
      .wordmark,
      .divider,
      .divider::before,
      .subtitle {
        animation-duration: 1ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="intro-stage" aria-label="Applictus intro animation">
    <div class="particle-field" aria-hidden="true">
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
    </div>

    <section class="brand-lockup" aria-label="Applictus application status tracker">
      <div class="brand-icon" aria-hidden="true">
        <img class="brand-logo" src="/Applictus_logo.png" alt="">
      </div>
      <div class="brand-copy">
        <h1 class="wordmark">Applictus</h1>
        <div class="divider" aria-hidden="true"></div>
        <div class="subtitle" aria-label="Application status tracker">
          <span><span class="is-application">Applic</span><span class="is-neutral">ation</span></span>
          <span><span class="is-neutral">Sta</span><span class="is-status">tus</span></span>
          <span class="is-tracker">Tracker</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
