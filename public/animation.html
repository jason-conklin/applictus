<!doctype html>
<html class="js" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#020711">
  <title>Applictus Intro Animation</title>
  <link rel="icon" href="/Applictus_logo.png" type="image/png">
  <link rel="preload" as="image" href="/applictus-animation-frame1.png">
  <link rel="preload" as="image" href="/applictus-animation-frame2.png">
  <link rel="preload" as="image" href="/applictus-animation-frame3.png">
  <link rel="preload" as="image" href="/applictus-animation-frame4.png">
  <link rel="preload" as="image" href="/applictus-animation-frame5.png">
  <link rel="preload" as="image" href="/applictus-animation-frame6.png">
  <link rel="preload" as="image" href="/Applictus_logo.png">
  <link rel="stylesheet" href="/styles.css?v=84">
  <style>
    html,
    body {
      width: 100%;
      min-width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020711;
    }

    body.animation-page {
      min-height: 100svh;
      color: #102747;
      overscroll-behavior: none;
    }

    .animation-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      padding: clamp(28px, 4vw, 72px);
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 47%, rgba(255, 255, 255, 0.98) 0%, rgba(247, 251, 255, 0.96) 30%, rgba(224, 237, 255, 0.88) 47%, rgba(57, 112, 214, 0.42) 64%, rgba(2, 7, 17, 0.98) 100%),
        linear-gradient(135deg, #020711 0%, #061226 46%, #071a33 100%);
    }

    .animation-stage::before,
    .animation-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .animation-stage::before {
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.66), transparent 0 28%),
        radial-gradient(circle at 50% 47%, rgba(53, 111, 218, 0.34), transparent 0 56%);
      filter: blur(18px);
      opacity: 0.78;
      transform: scale(1.04);
    }

    .animation-stage::after {
      background:
        radial-gradient(circle at 50% 50%, transparent 0 42%, rgba(0, 0, 0, 0.4) 100%),
        linear-gradient(rgba(158, 191, 235, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(158, 191, 235, 0.038) 1px, transparent 1px);
      background-size: 100% 100%, 72px 72px, 72px 72px;
      opacity: 0.62;
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 0 72%, transparent 100%);
      mask-image: radial-gradient(circle at 50% 50%, black 0 72%, transparent 100%);
    }

    .animation-stage .hero-banner {
      z-index: 1;
      width: min(1120px, calc(100vw - clamp(48px, 8vw, 128px)));
    }

    .animation-stage .hero-banner__float {
      width: 100%;
    }

    .animation-stage .hero-brand-lockup {
      margin-inline: auto;
    }

    body.animation-page .hero-banner.is-intro .hero-banner__intro {
      animation: landingHeroBrandShell 1935ms cubic-bezier(0.16, 1, 0.3, 1) 160ms both;
    }

    body.animation-page .hero-banner.is-intro .hero-banner__intro::before {
      animation: heroReveal 925ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    body.animation-page .hero-banner.is-intro .hero-banner__intro::after {
      animation: heroSweep 790ms cubic-bezier(0.2, 0.9, 0.2, 1) 265ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-icon {
      animation: landingHeroBrandIcon 3080ms cubic-bezier(0.16, 1, 0.3, 1) 230ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-icon::before {
      animation: landingHeroIconAura 3080ms ease 230ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-icon::after {
      animation: landingHeroReflection 3080ms ease 230ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo--frame1 {
      animation: landingLogoRevealUp 790ms cubic-bezier(0.22, 1, 0.36, 1) 280ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo--frame2 {
      animation: landingLogoRevealYellow 775ms cubic-bezier(0.22, 1, 0.36, 1) 600ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo--frame3 {
      animation: landingLogoRevealGreen 790ms cubic-bezier(0.22, 1, 0.36, 1) 1000ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo-blue--diagonal {
      animation: landingLogoRevealDown 1190ms cubic-bezier(0.22, 1, 0.36, 1) 1355ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo-blue--crossbar {
      animation: landingLogoRevealRight 1100ms cubic-bezier(0.22, 1, 0.36, 1) 1445ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo-blue--leg {
      animation: landingLogoRevealLeg 925ms cubic-bezier(0.22, 1, 0.36, 1) 1480ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-logo--complete {
      animation: landingLogoCompleteLock 160ms cubic-bezier(0.22, 1, 0.36, 1) 2570ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-wordmark {
      animation: landingHeroWordmarkReveal 860ms cubic-bezier(0.18, 0.86, 0.24, 1) 2660ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-divider {
      animation: landingHeroDividerFade 670ms ease 2940ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-divider::before {
      animation: landingHeroDividerSweep 685ms cubic-bezier(0.18, 0.86, 0.24, 1) 2940ms both;
    }

    body.animation-page.animate-ready.home-loaded .hero-banner.is-intro .hero-brand-subtitle {
      animation: landingHeroSubtitleReveal 615ms cubic-bezier(0.18, 0.86, 0.24, 1) 3060ms both;
    }

    @media (max-width: 680px) {
      .animation-stage {
        padding: 22px;
      }

      .animation-stage .hero-banner {
        width: min(100%, 430px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .animation-stage .hero-banner__float {
        animation: none !important;
      }
    }
  </style>
</head>
<body class="home-page animation-page animate-ready home-loaded landing-intro-complete">
  <main class="animation-stage" aria-label="Applictus intro animation">
    <section class="hero-banner hero-animate-logo is-intro" data-animation-logo>
      <div class="hero-banner__intro">
        <div class="hero-banner__float">
          <div class="hero-banner__tilt hero-brand-lockup" aria-label="Applictus application status tracker">
            <div class="hero-brand-icon" aria-hidden="true">
              <span class="hero-brand-logo-stage">
                <img class="hero-brand-logo hero-brand-logo--frame hero-brand-logo--frame1" src="/applictus-animation-frame1.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo--frame hero-brand-logo--frame2" src="/applictus-animation-frame2.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo--frame hero-brand-logo--frame3" src="/applictus-animation-frame3.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo-blue hero-brand-logo-blue--diagonal" src="/applictus-animation-frame4.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo-blue hero-brand-logo-blue--crossbar" src="/applictus-animation-frame5.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo-blue hero-brand-logo-blue--leg" src="/applictus-animation-frame6.png" alt="" draggable="false">
                <img class="hero-brand-logo hero-brand-logo--complete" src="/Applictus_logo.png" alt="" draggable="false">
              </span>
            </div>
            <div class="hero-brand-copy">
              <p class="hero-brand-wordmark">Applictus</p>
              <div class="hero-brand-divider" aria-hidden="true"></div>
              <p class="hero-brand-subtitle" aria-label="Application status tracker">
                <span><span class="hero-brand-accent hero-brand-accent--application">Applic</span><span>ation</span></span>
                <span><span>Sta</span><span class="hero-brand-accent hero-brand-accent--status">tus</span></span>
                <span>Tracker</span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
